{% extends "base.html" %}

{% block title %}Transfer - SecureBank Web Security Lab{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Fictional Transfer</h1>
    {% if account %}
      <p class="balance">{{ account.balance_credits }} lab credits available</p>
    {% endif %}
    {% if error %}
      <p class="error" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="/transfer">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label for="recipient_username">Recipient username</label>
      <input id="recipient_username" name="recipient_username" value="{{ recipient_username }}" required>

      <label for="amount_credits">Amount in lab credits</label>
      <input id="amount_credits" name="amount_credits" value="{{ amount_credits }}" inputmode="numeric" required>

      <label for="memo">Memo</label>
      <input id="memo" name="memo" value="{{ memo }}" maxlength="120">

      <button type="submit">Send lab credits</button>
    </form>
    <p><a href="/dashboard">Back to dashboard</a></p>
  </section>
{% endblock %}

{% extends "base.html" %}

{% block title %}Register - SecureBank Web Security Lab{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Create Lab Account</h1>
    {% if error %}
      <p class="error" role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="username">Username</label>
      <input id="username" name="username" value="{{ username }}" minlength="3" maxlength="32" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="12" autocomplete="new-password" required>

      <button type="submit">Register</button>
    </form>
    <p><a href="/login">Sign in instead</a></p>
  </section>
{% endblock %}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Pytest with coverage
        run: python -m pytest --cov=securebank --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  docs:
    name: Documentation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run documentation checks
        run: python scripts/check-docs.py

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Docker smoke verification
        run: |
          chmod +x scripts/verify-docker.sh
          ./scripts/verify-docker.sh

      - name: Upload Docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-compose.log || true

      - name: Store Docker logs
        if: failure() && hashFiles('docker-compose.log') != ''
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-log
          path: docker-compose.log
